<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Hotdogs San Onofre</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fbf9f1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-page {
            width: 92%;           /* Hace que la imagen ocupe el 92% del ancho, dejando un 8% libre */
            max-width: 600px;     /* Evita que en pantallas grandes o computadoras se deforme */
            height: auto;         /* Deja que la imagen tome su altura natural sin cortarse */
            display: block;       /* Quita espacios raros abajo de la imagen */
            margin: 15px auto;    /* El "auto" las centra perfectamente y el "15px" las separa arriba y abajo */
            border-radius: 8px;   /* Le da una ligera curvatura muy estética a las esquinas */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); /* Una sombra muy sutil para que se despegue del fondo */
        }
    </style>
</head>
<body>

    <img src="p1.jpg" alt="Menú Página 1" class="menu-page">
    <img src="p2.jpg" alt="Menú Página 2" class="menu-page">

</body>
</html>
